<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A2A Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root{
  --bg0:#0b1020; --bg1:#101631; --panel:rgba(148,163,184,.07);
  --line:rgba(148,163,184,.16); --ink:#e2e8f0; --dim:#8c9bb5; --faint:#5b6b86;
  --accent:#7dd3fc; --idle:#34d399; --busy:#fbbf24; --stale:#64748b;
  --t-text:#7dd3fc; --t-status:#a78bfa; --t-req:#fb7185; --t-res:#34d399;
  --t-file:#f59e0b; --t-ack:#94a3b8;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{font:13px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--ink);background:radial-gradient(1200px 700px at 70% -10%,#16204a 0%,var(--bg1) 45%,var(--bg0) 100%);
  overflow:hidden}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
header{height:50px;display:flex;align-items:center;gap:14px;padding:0 16px;
  border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
header .logo{font-weight:700;letter-spacing:.4px}
header .logo b{color:var(--accent)}
#busname{color:var(--dim)}
#conn{width:8px;height:8px;border-radius:50%;background:var(--stale)}
#conn.live{background:var(--idle);box-shadow:0 0 8px var(--idle)}
#stats{margin-left:auto;display:flex;gap:18px;color:var(--dim);font-size:12px}
#stats b{color:var(--ink);font-variant-numeric:tabular-nums}
#gear{color:var(--faint);font-size:15px}
#gear:hover{color:var(--ink)}
main{display:flex;height:calc(100% - 50px)}
#graphwrap{flex:1;position:relative;min-width:0}
#graph{width:100%;height:100%;display:block}
#empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--faint);pointer-events:none}
#side{width:320px;border-left:1px solid var(--line);overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:18px}
.sect h3{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);
  margin-bottom:8px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--accent)}
.agent-row{display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.agent-name{font-weight:600}
.agent-sub{color:var(--faint);font-size:11px;margin-top:2px}
.chip{display:inline-block;padding:1px 7px;border-radius:99px;font-size:10.5px;
  border:1px solid var(--line);color:var(--dim)}
.pending-row .preview{color:var(--dim);font-size:12px;margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.muted{color:var(--faint);font-size:12px}
#drawer{position:absolute;top:0;right:0;bottom:0;width:min(560px,90%);z-index:20;
  background:rgba(13,19,40,.96);border-left:1px solid var(--line);
  backdrop-filter:blur(10px);display:none;flex-direction:column}
#drawer.open{display:flex}
#drawer .dhead{padding:12px 16px;border-bottom:1px solid var(--line)}
#drawer .dtitle{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}
#drawer .dtitle .x{margin-left:auto;color:var(--faint);font-size:18px}
#drawer .dtitle .x:hover{color:var(--ink)}
#dfilters{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
#dfilters select,#dfilters input{background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:7px;padding:4px 8px;font:inherit;font-size:12px}
#dlog{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:9px}
.msg{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.msg .mhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--dim)}
.msg .who{color:var(--ink);font-weight:600}
.badge{padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;
  letter-spacing:.04em;color:#0b1020}
.msg .body{margin-top:6px;white-space:pre-wrap;word-break:break-word}
.msg pre{background:rgba(0,0,0,.25);border-radius:7px;padding:7px 9px;overflow-x:auto;
  font:11.5px/1.5 ui-monospace,Menlo,monospace;margin-top:6px}
.msg .more{color:var(--accent);font-size:11px;margin-top:4px}
.ackst{margin-left:auto;font-size:11px}
.flash{animation:flash 1.6s ease-out}
@keyframes flash{0%{border-color:var(--accent);box-shadow:0 0 14px rgba(125,211,252,.35)}100%{}}
#gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(7,10,22,.9);backdrop-filter:blur(8px)}
#gate form{width:330px;background:var(--bg1);border:1px solid var(--line);border-radius:14px;
  padding:26px}
#gate h1{font-size:17px;margin-bottom:4px}
#gate h1 b{color:var(--accent)}
#gate p{color:var(--faint);font-size:12px;margin-bottom:16px}
#gate label{display:block;font-size:11px;color:var(--dim);margin:10px 0 4px}
#gate input[type=text],#gate input[type=password]{width:100%;background:var(--panel);
  border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);font:inherit}
#gate .remember{display:flex;gap:7px;align-items:center;margin:14px 0;color:var(--dim);font-size:12px}
#gate button{width:100%;background:var(--accent);color:#082031;font-weight:700;
  border-radius:8px;padding:9px}
#gate .err{color:#fb7185;font-size:12px;margin-top:10px;min-height:16px}
.node-label{fill:var(--ink);font-size:12px;font-weight:600;pointer-events:none}
.node-sub{fill:var(--faint);font-size:9.5px;pointer-events:none}
.link{stroke:#5e7bb4;stroke-opacity:.35}
.linkhit{stroke:transparent;stroke-width:16;cursor:pointer}
.linkhit:hover + .link, .link.hot{stroke:var(--accent);stroke-opacity:.8}
@keyframes pulse{0%{r:14;opacity:.55}100%{r:30;opacity:0}}
.pulse{fill:none;stroke-width:1.5;animation:pulse 2.6s ease-out infinite}
</style>
<style>
.adm-actions{display:flex;gap:6px;margin-top:6px}
.approve,.deny{font:inherit;border:0;border-radius:6px;padding:4px 10px;cursor:pointer}
.approve{background:#16a34a;color:#fff}.deny{background:#b91c1c;color:#fff}
#jc-new{margin:4px 6px 4px 0}
</style>
</head>
<body>
<header>
  <span class="logo">A2A <b>Console</b></span>
  <span id="busname"></span>
  <span id="conn" title="live connection"></span>
  <div id="stats">
    <span>agents <b id="s-agents">–</b></span>
    <span>today <b id="s-today">–</b></span>
    <span>total <b id="s-total">–</b></span>
    <span>pending <b id="s-pending">–</b></span>
  </div>
  <button id="gear" title="sign out">⚙</button>
</header>
<main>
  <div id="graphwrap">
    <svg id="graph"></svg>
    <div id="empty" hidden></div>
    <section id="drawer">
      <div class="dhead">
        <div class="dtitle"><span id="dscope"></span><button class="x" id="dclose">×</button></div>
        <div id="dfilters">
          <select id="f-type"><option value="">all types</option>
            <option>text</option><option>status_update</option><option>task_request</option>
            <option>task_result</option><option>file_offer</option><option>ack</option></select>
          <input id="f-thread" list="threads" placeholder="thread…" size="12">
          <datalist id="threads"></datalist>
          <label class="chip"><input type="checkbox" id="f-bcast" checked> broadcasts</label>
        </div>
      </div>
      <div id="dlog"></div>
    </section>
  </div>
  <aside id="side">
    <div class="sect"><h3>Pending join requests</h3><div id="admissions"><div class="muted">none</div></div></div>
    <div class="sect"><h3>Agents</h3><div id="agents"></div></div>
    <div class="sect"><h3>Pending work</h3><div id="pending"><div class="muted">none</div></div></div>
    <div class="sect"><h3>Restarts (this session)</h3><div id="restarts"><div class="muted">none observed</div></div></div>
    <div class="sect"><h3>Bus settings</h3>
      <div class="card">
        <label class="muted">rotate join code</label><br>
        <input type="text" id="jc-new" placeholder="new code" size="10" autocomplete="off">
        <button id="jc-btn" class="approve">Rotate (re-auth)</button>
      </div></div>
  </aside>
</main>
<div id="gate">
  <form id="gateform">
    <h1>A2A <b>Console</b></h1>
    <p>Operator console. Sign in with your Google account to view the bus and approve agents.</p>
    <label>bus</label><input type="text" id="g-bus" value="research-x" autocomplete="off">
    <button type="submit">Sign in with Google</button>
    <div class="err" id="g-err"></div>
  </form>
</div>
<script>
/* ====================================================================== */
"use strict";
const $ = s => document.querySelector(s);
const TYPE_COLOR = {text:"#7dd3fc", status_update:"#a78bfa", task_request:"#fb7185",
                    task_result:"#34d399", file_offer:"#f59e0b", ack:"#94a3b8"};
const BCAST = "_broadcast";

const S = {            // app state
  bus:"", agents:[], pairs:new Map(), seq:0,
  pending:new Map(), sessions:new Map(), restarts:[], admissions:[],
  stats:{total:0,today:0}, threads:new Set(),
  scope:null, drawerMsgs:[], running:false,
};

const api = async (path) => {
  const r = await fetch(`/v1/b/${encodeURIComponent(S.bus)}${path}`,
    {credentials:"same-origin"});
  if (r.status === 401 || r.status === 404) throw {auth:true, status:r.status};
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
};
const pairKey = (x,y) => [x,y].sort().join("␀");
const rel = ts => {
  if (!ts) return "";
  const d = (Date.now() - new Date(ts).getTime())/1000;
  if (d < 0 || isNaN(d)) return ts;
  if (d < 60) return `${d|0}s ago`;
  if (d < 3600) return `${d/60|0}m ago`;
  if (d < 86400) return `${d/3600|0}h ago`;
  return `${d/86400|0}d ago`;
};
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const nick = id => {
  if (id === BCAST) return "broadcast";
  const a = S.agents.find(a => a.agent_id === id);
  return (a && a.nickname) ? a.nickname : id;
};
const statusColor = a => a._stale ? "var(--stale)" :
  a.status === "busy" ? "var(--busy)" : a.status === "offline" ? "var(--stale)" : "var(--idle)";

/* ------------------------------------------------ gate / boot ---------- */
const saved = (() => { try { return JSON.parse(localStorage.a2a_console || "null"); } catch { return null; } })();
if (saved && saved.bus) $("#g-bus").value = saved.bus;

// Sign-in: remember the chosen bus, then hand off to Google via the relay.
$("#gateform").addEventListener("submit", e => {
  e.preventDefault();
  const bus = $("#g-bus").value.trim() || "research-x";
  localStorage.a2a_console = JSON.stringify({bus});
  window.location = "/auth/login";
});
$("#gear").addEventListener("click", () => { window.location = "/auth/logout"; });
$("#jc-btn").addEventListener("click", () => {
  const code = $("#jc-new").value.trim();
  if (code) stepUp("joincode", "", {joincode: code});
});

// On load, try an existing operator session for the saved bus.
(async () => {
  S.bus = (saved && saved.bus) || "research-x";
  try {
    const ov = await api("/admin/overview");
    $("#gate").style.display = "none";
    boot(ov);
  } catch (err) {
    if (err.auth && err.status === 404) $("#g-err").textContent = `unknown bus "${S.bus}"`;
  }
})();

function boot(ov) {
  $("#busname").textContent = "· " + S.bus;
  S.agents = ov.agents; S.seq = ov.stats.last_seq;
  S.stats = {total:ov.stats.total, today:ov.stats.today};
  S.pairs.clear();
  for (const p of ov.pairs) {
    const k = pairKey(p.from, p.to);
    const e = S.pairs.get(k) || {a:[p.from,p.to].sort()[0], b:[p.from,p.to].sort()[1], count:0};
    e.count += p.count; S.pairs.set(k, e);
  }
  S.pending.clear();
  for (const t of ov.pending) S.pending.set(t.id, t);
  S.admissions = ov.admissions || [];
  for (const a of S.agents) S.sessions.set(a.agent_id, a.session_id);
  renderSide(); renderStats(); renderAdmissions(); graphInit(); graphUpdate();
  S.running = true; tailLoop(); admissionsLoop();
}

async function admissionsLoop() {
  while (S.running) {
    await new Promise(res => setTimeout(res, 8000));
    if (!S.running) break;
    try { const r = await api("/admin/pending"); S.admissions = r.admissions || []; renderAdmissions(); }
    catch (e) { if (e.auth) { S.running = false; $("#gate").style.display = "flex"; return; } }
  }
}

/* ------------------------------------------------ tail loop ------------ */
async function tailLoop() {
  while (S.running) {
    try {
      const r = await fetch(`/v1/b/${encodeURIComponent(S.bus)}/admin/tail?since_seq=${S.seq}&wait=25`,
        {credentials:"same-origin", signal: AbortSignal.timeout(40000)});
      if (r.status === 401) { S.running = false; $("#gate").style.display = "flex"; return; }
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      $("#conn").classList.add("live");
      onAgents(data.agents);
      for (const m of data.messages) onMessage(m);
      if (data.messages.length) { S.seq = data.next_seq; renderSide(); renderStats(); graphUpdate(); }
    } catch (e) {
      $("#conn").classList.remove("live");
      await new Promise(res => setTimeout(res, 3000));
    }
  }
}

function onAgents(agents) {
  for (const a of agents) {
    const old = S.sessions.get(a.agent_id);
    if (old && old !== a.session_id) {
      S.restarts.unshift({agent:a.agent_id, old, nw:a.session_id, t:Date.now()});
      S.restarts = S.restarts.slice(0, 20);
    }
    S.sessions.set(a.agent_id, a.session_id);
  }
  const had = S.agents.length;
  S.agents = agents;
  renderSide(); if (agents.length !== had) graphUpdate();
  refreshNodeStyles();
}

function onMessage(rec) {
  const m = rec.msg;
  S.stats.total++; S.stats.today++;
  if (m.thread) S.threads.add(m.thread);
  const k = pairKey(m.from, m.to);
  const e = S.pairs.get(k) || {a:[m.from,m.to].sort()[0], b:[m.from,m.to].sort()[1], count:0};
  e.count++; S.pairs.set(k, e);
  if (m.type === "task_request")
    S.pending.set(m.id, {seq:rec.seq, id:m.id, from:m.from, to:m.to, thread:m.thread,
                         ts:m.ts, preview:typeof m.body === "string" ? m.body : (m.body && m.body.text) || ""});
  if (m.type === "task_result" && m.reply_to) S.pending.delete(m.reply_to);
  animateDot(m);
  if (S.scope && matchScope(m)) appendMsg({seq:rec.seq, msg:m, acked:false}, true);
}

/* ------------------------------------------------ graph ---------------- */
let svg, sim, gLink, gNode, gDot, W, H;

function graphInit() {
  svg = d3.select("#graph");
  svg.selectAll("*").remove();
  const el = $("#graph"); W = el.clientWidth; H = el.clientHeight;
  gLink = svg.append("g"); gDot = svg.append("g"); gNode = svg.append("g");
  sim = d3.forceSimulation()
    .force("charge", d3.forceManyBody().strength(-650))
    .force("center", d3.forceCenter(W/2, H/2))
    .force("link", d3.forceLink().id(d => d.id).distance(190))
    .force("collide", d3.forceCollide(46));
  new ResizeObserver(() => {
    W = el.clientWidth; H = el.clientHeight;
    sim.force("center", d3.forceCenter(W/2, H/2)).alpha(.3).restart();
  }).observe(el);
}

function graphData() {
  const ids = new Set(S.agents.map(a => a.agent_id));
  const nodes = S.agents.map(a => ({id:a.agent_id, card:a}));
  let needB = false;
  const links = [];
  for (const e of S.pairs.values()) {
    if (e.a === e.b) continue;
    if (e.a === BCAST || e.b === BCAST) needB = true;
    if ((ids.has(e.a) || e.a === BCAST) && (ids.has(e.b) || e.b === BCAST))
      links.push({source:e.a, target:e.b, count:e.count, key:pairKey(e.a,e.b)});
  }
  if (needB || ids.size > 0) nodes.push({id:BCAST, bcast:true});
  return {nodes, links};
}

function graphUpdate() {
  if (!sim) return;
  const {nodes, links} = graphData();
  $("#empty").hidden = nodes.length > 1 || S.agents.length > 0;
  const old = new Map(sim.nodes().map(d => [d.id, d]));
  for (const n of nodes) { const o = old.get(n.id); if (o) { n.x=o.x; n.y=o.y; n.vx=o.vx; n.vy=o.vy; } }

  const link = gLink.selectAll("g.lk").data(links, d => d.key);
  link.exit().remove();
  const lkE = link.enter().append("g").attr("class","lk");
  lkE.append("line").attr("class","linkhit")
     .on("click", (ev,d) => openLog({a:d.source.id||d.source, b:d.target.id||d.target}));
  lkE.append("line").attr("class","link");
  gLink.selectAll("g.lk").select("line.link")
     .attr("stroke-width", d => Math.min(1.2 + Math.sqrt(d.count), 8));

  const node = gNode.selectAll("g.nd").data(nodes, d => d.id);
  node.exit().remove();
  const ndE = node.enter().append("g").attr("class","nd").style("cursor","pointer")
    .call(d3.drag()
      .on("start",(ev,d)=>{if(!ev.active)sim.alphaTarget(.25).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(ev,d)=>{d.fx=ev.x;d.fy=ev.y;})
      .on("end",(ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on("click",(ev,d)=> d.bcast ? openLog({bcast:true}) : openLog({agent:d.id}));
  ndE.append("circle").attr("class","pulse");
  ndE.append("circle").attr("class","body").attr("r", d => d.bcast ? 17 : 23)
     .attr("fill", "#16204a").attr("stroke-width", 2.5)
     .attr("stroke-dasharray", d => d.bcast ? "4 4" : null);
  ndE.append("text").attr("class","node-label").attr("text-anchor","middle")
     .attr("dy", d => d.bcast ? 3 : -32);
  ndE.append("text").attr("class","node-sub").attr("text-anchor","middle").attr("dy", 40);
  refreshNodeStyles();

  sim.nodes(nodes).on("tick", tick);
  sim.force("link").links(links);
  sim.alpha(.6).restart();
}

function refreshNodeStyles() {
  if (!gNode) return;
  gNode.selectAll("g.nd").each(function(d) {
    const g = d3.select(this);
    if (d.bcast) {
      g.select("circle.body").attr("stroke","var(--faint)");
      g.select("text.node-label").text("📢").attr("font-size", 13);
      g.select("text.node-sub").text("broadcast");
      g.select("circle.pulse").attr("stroke","none");
      return;
    }
    const a = S.agents.find(x => x.agent_id === d.id) || d.card || {};
    const col = statusColor(a);
    g.select("circle.body").attr("stroke", col);
    g.select("circle.pulse").attr("stroke", a._stale ? "none" : col);
    g.select("text.node-label").text(a.nickname || d.id);
    g.select("text.node-sub").text(`${a.status||"?"} · ${(a.cluster&&a.cluster.name)||"?"}`);
  });
}

function tick() {
  gLink.selectAll("g.lk").selectAll("line")
    .attr("x1", function(){return d3.select(this.parentNode).datum().source.x})
    .attr("y1", function(){return d3.select(this.parentNode).datum().source.y})
    .attr("x2", function(){return d3.select(this.parentNode).datum().target.x})
    .attr("y2", function(){return d3.select(this.parentNode).datum().target.y});
  gNode.selectAll("g.nd").attr("transform", d => `translate(${d.x},${d.y})`);
}

function animateDot(m) {
  if (!sim) return;
  const ns = sim.nodes();
  const a = ns.find(n => n.id === m.from), b = ns.find(n => n.id === m.to);
  if (!a || !b) return;
  const dot = gDot.append("circle").attr("r", 5)
    .attr("fill", TYPE_COLOR[m.type] || "var(--accent)")
    .attr("cx", a.x).attr("cy", a.y).style("filter","drop-shadow(0 0 6px currentColor)");
  dot.transition().duration(700).ease(d3.easeQuadInOut)
     .attr("cx", b.x).attr("cy", b.y).transition().duration(250)
     .attr("r", 0).remove();
}

/* ------------------------------------------------ sidebar -------------- */
function renderStats() {
  $("#s-agents").textContent = S.agents.length;
  $("#s-today").textContent = S.stats.today;
  $("#s-total").textContent = S.stats.total;
  $("#s-pending").textContent = S.pending.size;
}

function renderSide() {
  $("#agents").innerHTML = S.agents.map(a => `
    <div class="card" onclick='openLog({agent:${JSON.stringify(a.agent_id)}})'>
      <div class="agent-row"><span class="dot" style="background:${statusColor(a)}"></span>
        <span class="agent-name">${esc(a.nickname || a.agent_id)}</span>
        <span class="chip">${esc(a.status||"?")}</span></div>
      <div class="agent-sub">${esc(a.agent_id)} · sess ${esc(a.session_id||"?")} ·
        hb ${a._heartbeat_age_s}s${a._stale ? " · STALE" : ""} ·
        ${esc((a.job_types||[]).join(",")||"–")}${a.status_detail ? " · "+esc(a.status_detail) : ""}</div>
    </div>`).join("") || `<div class="muted">none registered</div>`;

  const pend = [...S.pending.values()].sort((x,y) => y.seq - x.seq);
  $("#pending").innerHTML = pend.map(t => `
    <div class="card pending-row" onclick='openLog({a:${JSON.stringify(t.from)},b:${JSON.stringify(t.to)},thread:${JSON.stringify(t.thread||"")}})'>
      <div><span class="who">${esc(nick(t.from))}</span> → <span class="who">${esc(nick(t.to))}</span>
        ${t.thread ? `<span class="chip">${esc(t.thread)}</span>` : ""}
        <span class="muted" style="float:right">${rel(t.ts)}</span></div>
      <div class="preview">${esc(t.preview||"")}</div>
    </div>`).join("") || `<div class="muted">none — nobody owes anybody work</div>`;

  $("#restarts").innerHTML = S.restarts.map(r => `
    <div class="card" onclick='openLog({agent:${JSON.stringify(r.agent)}})'>
      <b>${esc(nick(r.agent))}</b> restarted
      <span class="muted">${esc(r.old)} → ${esc(r.nw)} · ${rel(new Date(r.t).toISOString())}</span>
    </div>`).join("") || `<div class="muted">none observed</div>`;

  $("#threads").innerHTML = [...S.threads].map(t => `<option value="${esc(t)}">`).join("");
}

function renderAdmissions() {
  const list = S.admissions || [];
  $("#admissions").innerHTML = list.map(a => `
    <div class="card">
      <div class="agent-row"><span class="agent-name">${esc(a.nickname || a.agent_id)}</span>
        <span class="chip">${esc(a.cluster||"?")}</span></div>
      <div class="agent-sub">${esc(a.agent_id)} · ip ${esc(a.source_ip||"?")} ·
        ${esc((a.job_types||[]).join(",")||"–")}${a.gpus ? " · "+esc(a.gpus) : ""}</div>
      <div class="adm-actions">
        <button class="approve" onclick='stepUp("approve",${JSON.stringify(a.agent_id)})'>Approve</button>
        <button class="deny" onclick='denyAgent(${JSON.stringify(a.agent_id)})'>Deny</button>
      </div>
    </div>`).join("") || `<div class="muted">none waiting</div>`;
}
function stepUp(action, agent_id, extra) {
  const p = new URLSearchParams({action, bus:S.bus, agent_id: agent_id||""});
  if (extra && extra.joincode) p.set("joincode", extra.joincode);
  if (extra && extra.message) p.set("message", extra.message);
  window.location = "/auth/login?" + p.toString();
}
function denyAgent(id) {
  stepUp("deny", id, {message: prompt("Reason to send (optional):", "") || ""});
}

/* ------------------------------------------------ drawer / log --------- */
function scopeTitle(sc) {
  if (sc.bcast) return "📢 broadcasts";
  if (sc.agent) return `⬤ ${nick(sc.agent)} — full log`;
  return `${nick(sc.a)} ⇄ ${nick(sc.b)}`;
}

function matchScope(m) {
  const sc = S.scope; if (!sc) return false;
  const ft = $("#f-type").value, fth = $("#f-thread").value.trim();
  if (ft && m.type !== ft) return false;
  if (fth && m.thread !== fth) return false;
  const bc = m.to === BCAST;
  if (bc && !$("#f-bcast").checked) return false;
  if (sc.bcast) return bc;
  if (sc.agent) return m.from === sc.agent || m.to === sc.agent || bc;
  return (m.from === sc.a && m.to === sc.b) || (m.from === sc.b && m.to === sc.a) ||
         (bc && (m.from === sc.a || m.from === sc.b));
}

async function openLog(sc) {
  S.scope = sc;
  if (sc.thread !== undefined) $("#f-thread").value = sc.thread || "";
  $("#dscope").textContent = scopeTitle(sc);
  $("#drawer").classList.add("open");
  await loadLog();
}

async function loadLog() {
  const sc = S.scope; if (!sc) return;
  const q = new URLSearchParams({limit:"300"});
  if (sc.a && sc.b) { q.set("a", sc.a); q.set("b", sc.b); }
  else if (sc.agent) q.set("agent", sc.agent);
  // bcast scope: fetch the whole-bus log and filter to broadcasts client-side
  const ft = $("#f-type").value; if (ft) q.set("type", ft);
  const fth = $("#f-thread").value.trim(); if (fth) q.set("thread", fth);
  q.set("include_broadcast", $("#f-bcast").checked ? "true" : "false");
  let data;
  try { data = await api(`/admin/log?${q}`); }
  catch { $("#dlog").innerHTML = `<div class="muted">failed to load log</div>`; return; }
  let msgs = data.messages;
  if (sc.bcast) msgs = msgs.filter(r => r.msg.to === BCAST);
  S.drawerMsgs = msgs;
  $("#dlog").innerHTML = msgs.length ? "" : `<div class="muted">no messages match</div>`;
  for (const r of msgs) appendMsg(r, false);
  $("#dlog").scrollTop = $("#dlog").scrollHeight;
}

function appendMsg(r, flash) {
  const m = r.msg;
  const color = TYPE_COLOR[m.type] || "#7dd3fc";
  const ack = r.acked === null || m.to === BCAST ? "—" : (r.acked ? "✓✓ acked" : "○ delivered");
  let bodyHtml;
  if (typeof m.body === "string") {
    bodyHtml = `<div class="body">${esc(m.body)}</div>`;
  } else {
    const j = JSON.stringify(m.body, null, 2);
    bodyHtml = j.length > 400
      ? `<details><summary class="more">show body (${j.length} chars)</summary><pre>${esc(j)}</pre></details>`
      : `<pre>${esc(j)}</pre>`;
  }
  const div = document.createElement("div");
  div.className = "msg" + (flash ? " flash" : "");
  div.id = "m-" + m.id.slice(0,8);
  div.innerHTML = `
    <div class="mhead">
      <span class="who">${esc(nick(m.from))}</span>→<span class="who">${esc(nick(m.to))}</span>
      <span class="badge" style="background:${color}">${esc(m.type)}</span>
      ${m.thread ? `<span class="chip">${esc(m.thread)}</span>` : ""}
      ${m.reply_to ? `<a class="chip" href="#m-${esc(m.reply_to.slice(0,8))}">↩ ${esc(m.reply_to.slice(0,8))}</a>` : ""}
      <span class="chip" title="sender session">s:${esc(m.session||"?")}</span>
      <span class="muted">#${r.seq ?? ""}</span>
      <span class="muted">${esc(m.ts||"")} · ${rel(m.ts)}</span>
      <span class="ackst muted">${ack}</span>
    </div>${bodyHtml}`;
  $("#dlog").appendChild(div);
  if (flash) $("#dlog").scrollTop = $("#dlog").scrollHeight;
}

$("#dclose").addEventListener("click", () => { $("#drawer").classList.remove("open"); S.scope = null; });
document.addEventListener("keydown", e => { if (e.key === "Escape") $("#dclose").click(); });
for (const id of ["f-type","f-thread","f-bcast"])
  $("#"+id).addEventListener("change", loadLog);

</script>
</body>
</html>
